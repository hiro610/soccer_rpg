<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>サッカーせいちょうRPG - スプリント1（完全デバッグ版）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1b5e20;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .card-outside-header {
            max-width: 400px;
            margin: 0 auto 10px auto;
            text-align: center;
        }

        .name-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 15px auto;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        .status-card {
            height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 15px;
        }

        .card-background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-box {
            background: rgba(13, 27, 42, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 15px 20px;
            border-radius: 12px;
            width: 85%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 5px;
        }

        .character-emoji-area {
            font-size: 80px;
            margin-bottom: 120px;
            animation: bounce 2s infinite ease-in-out;
        }

        .stage-badge {
            background-color: #00e5ff;
            color: #0d1b2a;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* ★すべてのボタンにダブルタップズーム防止を追加 */
        button {
            background-color: #ff9800;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #e65100;
            transition: 0.1s;
            margin: 5px;
            touch-action: manipulation; /* ★これiPhoneの拡大バグを1発でなおす魔法 */
        }

        button:disabled {
            background-color: #78909c !important;
            box-shadow: 0 4px 0 #455a64 !important;
            cursor: not-allowed;
        }

        button:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 試合スタジアム */
        .mini-stadium {
            width: 90%;
            height: 120px;
            background: linear-gradient(#2e7d32 80%, #1b5e20 100%);
            border: 2px solid #fff;
            border-radius: 10px;
            margin: 5px auto 10px auto;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }

        .stadium-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.3);
        }

        /* ★新設：ジャンプの「タイミング合わせ用」の目印の赤いライン */
        .jump-line-marker {
            position: absolute;
            top: 0;
            left: 28%; /* 敵がここに来た瞬間に押す！ */
            width: 4px;
            height: 100%;
            background-color: #ff1744;
            box-shadow: 0 0 8px #ff1744;
            display: none; /* ジャンプフェーズ以外は隠す */
            z-index: 5;
        }

        /* リアルタイム・スタミナ枠（スタミナの可視化） */
        .stamina-header {
            font-size: 12px;
            font-weight: bold;
            text-align: left;
            width: 80%;
            margin: 5px auto 2px auto;
            display: flex;
            justify-content: space-between;
        }
        .stamina-container-ui {
            width: 80%;
            height: 12px;
            background-color: #333;
            border-radius: 6px;
            margin: 0 auto 10px auto;
            border: 1px solid #fff;
            overflow: hidden;
        }
        .stamina-bar-ui {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #4caf50, #8bc34a);
            transition: width 0.2s ease-out;
        }

        .match-avatar {
            position: absolute;
            bottom: 15px;
            left: 10%;
            width: 50px;
            height: 50px;
            font-size: 40px;
            transition: left 0.1s ease-out, bottom 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .match-avatar img { width: 100%; height: 100%; object-fit: contain; }

        /* 敵：初期位置は画面の右外（right: -60px） */
        .match-enemy {
            position: absolute;
            bottom: 15px;
            left: 110%; /* 右外からスタート */
            width: 50px;
            height: 50px;
            font-size: 40px;
            z-index: 9;
            transition: left 0.05s linear, transform 0.2s; /* 滑らかに滑り込んでくる設定 */
        }

        .gauge-container {
            width: 80%;
            height: 20px;
            background-color: #ddd;
            margin: 10px auto;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
        }

        .sweet-spot {
            position: absolute;
            left: 70%;
            width: 15%;
            height: 100%;
            background-color: #ff1744;
        }

        .gauge-bar {
            height: 100%;
            width: 8px;
            background-color: #333;
            position: absolute;
            left: 0;
        }

        .mash-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #ffeb3b, #ff9800);
            transition: width 0.05s linear;
        }

        .log-box {
            background: #0d1b2a;
            padding: 12px;
            border-radius: 8px;
            min-height: 40px;
            margin-top: 10px;
            font-size: 14px;
            border-left: 4px solid #00e5ff;
            text-align: left;
            line-height: 1.5;
        }

        .report-box {
            border: 2px dashed #ffeb3b;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            background: rgba(255,235,59,0.05);
        }

        #result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #result-announcement {
            font-size: 46px;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #result-sub-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 15px;
            max-width: 350px;
            font-size: 16px;
            line-height: 1.6;
        }

        @keyframes popIn {
            0% { transform: scale(0.4); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes goalFlash {
            0% { transform: scale(1); text-shadow: 0 0 10px #fff, 0 0 20px #ffeb3b, 0 0 30px #ff9800; }
            100% { transform: scale(1.08); text-shadow: 0 0 20px #fff, 0 0 40px #ff1744, 0 0 60px #ff1744; }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes moveBar {
            0% { left: 0%; }
            100% { left: 96%; }
        }
    </style>
</head>
<body>

    <h1>⚽️ サッカーせいちょうRPG ⚽️</h1>

    <div class="card-outside-header">
        <div class="stage-badge" id="txt-stage">Jリーグへん</div>
        <div class="name-container">
            <h2 style="margin: 0; font-size: 22px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">なまえ：<span id="txt-name" style="color: #00e5ff;">？？？</span> 選手</h2>
            <button onclick="changeName()" style="background-color: #78909c; box-shadow: 0 4px 0 #455a64; padding: 6px 14px; font-size: 12px; margin: 0;">なまえをかえる</button>
        </div>
    </div>

    <div class="card status-card" id="status-card-element">
        <div id="bg-img-container"></div>
        <div class="card-content" id="fallback-emoji-container" style="display: none; height: 100%; justify-content: center;">
            <div class="character-emoji-area" id="txt-fallback-emoji">👦</div>
        </div>
        <div class="card-content" style="margin-top: auto;">
            <div class="glass-box">
                <p style="font-size: 15px; font-weight: bold; line-height: 1.6; margin: 0; text-align: left; padding-left: 10px;">
                    レベル: <span id="txt-level" style="color: #ffeb3b; font-size: 20px;">1</span><br>
                    ⚽️ キック: <span id="txt-kick">10</span><br>
                    ⚡️ スピード: <span id="txt-speed">10</span><br>
                    🪄 テクニック: <span id="txt-technique">10</span><br>
                    ❤️ スタミナ: <span id="txt-stamina">10</span><br>
                    <span style="color: #ffeb3b;">💰 もってるおかね: <span id="txt-money">0</span> 円</span>
                </p>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>ほうこく広場（AIかんとく）</h3>
        <button id="btn-voice" onclick="startSpeech()">🎙 れんしゅうを声でほうこく！</button>
        <div class="log-box" id="voice-log">上のボタンをおして、「シュートのれんしゅうをしたよ！」などとしゃべってね！</div>
        <div id="confirm-buttons-area" style="display: none; margin-top: 15px;">
            <button id="btn-confirm-ok" onclick="commitVoiceResult()" style="background-color: #4caf50; box-shadow: 0 4px 0 #388e3c; padding: 14px 28px; font-size: 18px;">👍 これでOK！</button>
            <button id="btn-confirm-retry" onclick="retryVoiceInput()" style="background-color: #f44336; box-shadow: 0 4px 0 #d32f2f; padding: 14px 28px; font-size: 18px;">🔄 やりなおす</button>
        </div>
    </div>

    <div class="card">
        <h3>VS ライバルチーム（3れんコンボ！）</h3>
        
        <div class="stamina-header">
            <span>しあいちゅうのスタミナ</span>
            <span id="txt-match-stamina-val">10/10</span>
        </div>
        <div class="stamina-container-ui">
            <div class="stamina-bar-ui" id="ui-stamina-bar"></div>
        </div>

        <div class="mini-stadium">
            <div class="stadium-line"></div>
            <div class="jump-line-marker" id="ui-jump-marker"></div> <div class="match-avatar" id="stadium-player">👦</div>
            <div class="match-enemy" id="stadium-enemy">🏃‍♂️</div>
        </div>

        <div id="game-mechanic-zone" style="min-height: 40px; margin: 5px 0;">
            <div id="ui-box-dribble" style="display: none;">
                <div class="gauge-container"><div class="mash-bar" id="dribble-mash-bar"></div></div>
            </div>
            <div id="ui-box-jump" style="display: none;">
                <div style="font-size:18px; font-weight:bold; color:#ffeb3b; height:24px;" id="jump-signal-text">あいてが走ってきた！タイミングをあわせろ！</div>
            </div>
            <div id="ui-box-shoot" style="display: none;">
                <div class="gauge-container" id="final-gauge-box"><div class="sweet-spot"></div><div class="gauge-bar" id="final-indicator"></div></div>
            </div>
        </div>

        <div id="battle-buttons-area">
            <button id="btn-game-main" onclick="startMatchCombo()" style="background-color: #d32f2f; box-shadow: 0 4px 0 #b71c1c; width: 85%;">しあいはじめる！</button>
        </div>
        
        <div class="log-box" id="battle-log">ドリブル ➔ ジャンプ ➔ シュートの3連コンボできめろ！</div>
    </div>

    <div id="result-overlay">
        <div id="result-announcement">GOAL!!</div>
        <div id="result-sub-box"><p id="result-sub-text" style="margin: 0;"></p></div>
        <button onclick="closeResultOverlay()" style="margin-top: 35px; font-size: 20px; padding: 14px 35px; background-color: #4caf50; box-shadow: 0 4px 0 #388e3c;">つぎの試合へ！</button>
    </div>

    <button onclick="resetData()" style="background: none; box-shadow: none; font-size: 10px; color: #aaa; margin-top: 30px;">データをさいしょからにする</button>

    <script>
        // --- 1. グローバル変数とセーブデータの定義 ---
        let playerData = { name: "", level: 1, kick: 10, speed: 10, technique: 10, stamina: 10, money: 0 };
        let imageSrcGlobal = "avatar_j.png";

        window.onload = function() {
            const savedData = localStorage.getItem('soccer_rpg_save');
            if (savedData) { playerData = JSON.parse(savedData); }
            if (!playerData.name) { setTimeout(() => { askName(); }, 500); } else { updateUI(); }
        };

        function askName() {
            let inputName = prompt("きみの なまえを おしえてね！", "あすき");
            playerData.name = (inputName === null || inputName.trim() === "") ? "あすき" : inputName;
            saveGame();
        }

        function changeName() {
            let inputName = prompt("新しい なまえを おしえてね！", playerData.name);
            if (inputName !== null && inputName.trim() !== "") { playerData.name = inputName; saveGame(); }
        }

        function updateUI() {
            document.getElementById('txt-name').innerText = playerData.name;
            document.getElementById('txt-level').innerText = playerData.level;
            document.getElementById('txt-kick').innerText = playerData.kick;
            document.getElementById('txt-speed').innerText = playerData.speed;
            document.getElementById('txt-technique').innerText = playerData.technique;
            document.getElementById('txt-stamina').innerText = playerData.stamina;
            document.getElementById('txt-money').innerText = playerData.money;

            const stageBadge = document.getElementById('txt-stage');
            const bgImgContainer = document.getElementById('bg-img-container');
            const fallbackContainer = document.getElementById('fallback-emoji-container');
            const fallbackEmoji = document.getElementById('txt-fallback-emoji');
            const stPlayer = document.getElementById('stadium-player');
            
            let emojiText = "👦";

            if (playerData.level >= 20) {
                stageBadge.innerText = "🏆 せかいチャンピオン！"; stageBadge.style.backgroundColor = "#ffd700";
                imageSrcGlobal = "avatar_clear.png"; emojiText = "👑🏆";
            } else if (playerData.level >= 10) {
                stageBadge.innerText = "🌎 ワールドカップへん"; stageBadge.style.backgroundColor = "#ff4081";
                imageSrcGlobal = "avatar_w.png"; emojiText = "🇯🇵🏃‍♂️";
            } else {
                stageBadge.innerText = "⚽️ Jリーグへん"; stageBadge.style.backgroundColor = "#00e5ff";
                imageSrcGlobal = "avatar_j.png"; emojiText = "👦";
            }

            fallbackEmoji.innerText = emojiText;
            fallbackContainer.style.display = 'none';

            const htmlWithImage = `<img src="${imageSrcGlobal}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                   <span style="display:none;">${emojiText}</span>`;
            stPlayer.innerHTML = htmlWithImage;

            bgImgContainer.innerHTML = `<img src="${imageSrcGlobal}" class="card-background-img" onload="document.getElementById('fallback-emoji-container').style.display='none';" onerror="this.style.display='none'; document.getElementById('fallback-emoji-container').style.display='block';">`;
        }

        function saveGame() { localStorage.setItem('soccer_rpg_save', JSON.stringify(playerData)); updateUI(); }

        // --- 2. 音声認識 ---
        let recognition = null; let isListening = false; let latestTranscript = ""; let isWaitingConfirm = false;

        function startSpeech() {
            const voiceBtn = document.getElementById('btn-voice'); const voiceLog = document.getElementById('voice-log');
            if (isListening && recognition) { isWaitingConfirm = true; recognition.stop(); voiceBtn.style.display = "none"; voiceLog.innerText = "⏳ いま話した言葉をあつめています..."; return; }
            if (!recognition) {
                const SpeechRecognition = window.WindowsSpeechRecognition || window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) { voiceLog.innerText = "エラー: マイク非対応"; return; }
                recognition = new SpeechRecognition(); recognition.lang = 'ja-JP'; recognition.interimResults = true; recognition.maxAlternatives = 1; recognition.continuous = true; 
                recognition.onstart = function() { isListening = true; isWaitingConfirm = false; latestTranscript = ""; voiceBtn.innerText = "🛑 話しおわったらここをおす！"; voiceBtn.style.backgroundColor = "#d32f2f"; voiceBtn.style.boxShadow = "0 4px 0 #b71c1c"; voiceLog.innerText = "スマホにむかってゆっくり話してね！"; };
                recognition.onresult = function(event) { let resultText = ""; for (let i = event.resultIndex; i < event.results.length; i++) { resultText += event.results[i][0].transcript; } latestTranscript = resultText; voiceLog.innerHTML = `<strong>ききとり中：</strong> 「<span style="color: #00e5ff;">${latestTranscript}</span>」`; };
                recognition.onerror = function(event) { if (event.error !== 'aborted') { voiceLog.innerText = "エラー発生"; resetVoiceUI(); } };
                recognition.onend = function() { isListening = false; if (isWaitingConfirm) { document.getElementById('confirm-buttons-area').style.display = 'block'; if (latestTranscript.trim() === "") { document.getElementById('voice-log').innerHTML = `何も聞こえなかったよ。`; document.getElementById('btn-confirm-ok').disabled = true; } else { document.getElementById('voice-log').innerHTML = `🤖 <strong>AIかんとく：</strong><br>「<span style="color: #00e5ff; font-size:16px;">${latestTranscript}</span>」<br>でOKなら緑のボタンをおしてね！`; document.getElementById('btn-confirm-ok').disabled = false; } } else { resetVoiceUI(); } };
            }
            try { recognition.start(); } catch (e) { console.log(e); }
        }
        function retryVoiceInput() { isWaitingConfirm = false; document.getElementById('confirm-buttons-area').style.display = 'none'; resetVoiceUI(); }
        function commitVoiceResult() { isWaitingConfirm = false; document.getElementById('confirm-buttons-area').style.display = 'none'; processAIWithText(latestTranscript); }
        function resetVoiceUI() { const voiceBtn = document.getElementById('btn-voice'); voiceBtn.style.display = 'inline-block'; voiceBtn.innerText = "🎙 れんしゅうを声でほうこく！"; voiceBtn.style.backgroundColor = "#ff9800"; voiceBtn.style.boxShadow = "0 4px 0 #e65100"; document.getElementById('voice-log').innerText = "上のボタンをおして練習を教えてね！"; }
        function processAIWithText(text) {
            const voiceLog = document.getElementById('voice-log'); voiceLog.innerHTML = `⏳ 査定中...`;
            setTimeout(() => {
                let statusUpText = "";
                if (text.includes("シュート") || text.includes("点") || text.includes("キック")) { playerData.kick += 3; statusUpText = "⚽️ キックが 【3】 アップ！"; }
                else if (text.includes("走") || text.includes("ダッシュ") || text.includes("スピード") || text.includes("はやい")) { playerData.speed += 3; statusUpText = "⚡️ スピードが 【3】 アップ！"; }
                else if (text.includes("パス") || text.includes("リフティング") || text.includes("うまい") || text.includes("わざ")) { playerData.technique += 3; statusUpText = "🪄 テクニックが 【3】 アップ！"; }
                else if (text.includes("ドリブル") || text.includes("たいりょく") || text.includes("スタミナ") || text.includes("しあい")) { playerData.stamina += 3; statusUpText = "❤️ スタミナが 【3】 アップ！"; }
                else { playerData.kick += 1; playerData.speed += 1; playerData.technique += 1; playerData.stamina += 1; statusUpText = "🌟 すべての能力が 【1】 アップ！"; }
                playerData.level += 1;
                voiceLog.innerHTML = `🤖 <strong>AIかんとく：</strong><br>「${text}」だね！<div class="report-box"><strong>📊 しんさくリポート</strong><br>━<br>${statusUpText}<br>🆙 <strong>レベルが 【1】 あがったぞ！</strong><br>━</div><br><button onclick="resetVoiceUI()" style="background-color: #4caf50; padding: 6px 14px; font-size: 13px; margin: 0;">つぎのれんしゅうへ</button>`;
                saveGame();
            }, 1500);
        }

        // --- 3. ＝★＝ 新・3連コンボ試合システム ＝★＝ ---
        let currentMatchStamina = 10;
        let maxMatchStamina = 10;
        let mashProgress = 0; // ドリブル連打の現在のパーセント（0〜100）
        let gameLoopInterval = null;
        let matchPhase = ""; // "dribble", "jump", "shoot"
        let enemyPositionLeft = 110; // 敵のX座標(%)
        let enemySpeed = 1.5; // 敵が迫ってくる速度
        let hasJumped = false;

        // スタミナの見た目を更新するUI関数
        function updateStaminaUI() {
            document.getElementById('txt-match-stamina-val').innerText = `${currentMatchStamina}/${maxMatchStamina}`;
            const bar = document.getElementById('ui-stamina-bar');
            const percent = (currentMatchStamina / maxMatchStamina) * 100;
            bar.style.width = percent + "%";
            
            // 残量に合わせてスタミナバーの色を変化させる
            if (percent > 50) { bar.style.background = 'linear-gradient(to right, #4caf50, #8bc34a)'; }
            else if (percent > 25) { bar.style.background = 'linear-gradient(to right, #ff9800, #ffc107)'; }
            else { bar.style.background = 'linear-gradient(to right, #f44336, #ff5722)'; }
        }

        function resetStadiumElements() {
            const player = document.getElementById('stadium-player');
            const enemy = document.getElementById('stadium-enemy');
            player.style.left = "10%"; player.style.bottom = "15px";
            enemy.style.left = "110%"; enemy.style.transform = "none";
            enemy.innerText = "🏃‍♂️";
            document.getElementById('ui-jump-marker').style.display = 'none';
            
            // 全UIメカニックスを一旦隠す
            document.getElementById('ui-box-dribble').style.display = 'none';
            document.getElementById('ui-box-jump').style.display = 'none';
            document.getElementById('ui-box-shoot').style.display = 'none';
        }

        // 試合をはじめる！
        function startMatchCombo() {
            maxMatchStamina = playerData.stamina;
            currentMatchStamina = playerData.stamina;
            updateStaminaUI();
            resetStadiumElements();
            initDribblePhase();
        }

        // ── フェーズ1：ボタン連打でドリブル（じわじわ減る連打システム） ──
        function initDribblePhase() {
            matchPhase = "dribble";
            mashProgress = 0;
            
            document.getElementById('ui-box-dribble').style.display = 'block';
            document.getElementById('battle-log').innerText = "【フェーズ1】ボタンを連打（れんだ）しろ！おそいとスタミナがへるぞ！";
            document.getElementById('battle-buttons-area').innerHTML = `<button id="btn-game-main" onclick="executeMash()" style="background-color: #29b6f6; box-shadow: 0 4px 0 #0288d1; width:85%; font-size:18px;">🔥 ダッシュ連打！！！</button>`;

            let timeLeft = 3.5; // 3.5秒間の連打勝負
            gameLoopInterval = setInterval(() => {
                timeLeft -= 0.05;
                
                // ★速度の正解を教えるギミック：放置すると秒速でゲージが減る！
                // スピードが高いほど、ゲージの減少速度がマイルドになり有利になる設計
                const decay = Math.max(0.4, 1.2 - (playerData.speed / 30));
                mashProgress = Math.max(0, mashProgress - decay);
                document.getElementById('dribble-mash-bar').style.width = mashProgress + "%";
                
                // あすき選手も進捗に合わせて進む
                document.getElementById('stadium-player').style.left = (10 + (mashProgress * 0.4)) + "%";

                if (timeLeft <= 0) {
                    clearInterval(gameLoopInterval);
                    endDribblePhase();
                }
            }, 50);
        }

        function executeMash() {
            // 1タップごとにゲージが大幅プラス
            mashProgress = Math.min(100, mashProgress + 7);
            document.getElementById('dribble-mash-bar').style.width = mashProgress + "%";
        }

        function endDribblePhase() {
            const log = document.getElementById('battle-log');
            // 時間終了時にゲージが75%以上なら合格！
            const isSuccess = mashProgress >= 75;

            if (isSuccess) {
                log.innerHTML = `<span style="color:#4caf50; font-weight:bold;">✨ ドリブル大せいこう！</span> あいてをぶっちぎった！`;
            } else {
                currentMatchStamina = Math.max(1, currentMatchStamina - 3);
                updateStaminaUI();
                log.innerHTML = `<span style="color:#f44336; font-weight:bold;">😢 つかまった！</span> はげしいプレスでスタミナがへった！(-3)`;
            }

            setTimeout(() => {
                document.getElementById('ui-box-dribble').style.display = 'none';
                initJumpPhase();
            }, 1500);
        }

        // ── フェーズ2：相手が走ってくるタイミングジャンプ（物理スライディング） ──
        function initJumpPhase() {
            matchPhase = "jump";
            hasJumped = false;
            enemyPositionLeft = 110;
            
            // テクニックとレベルが高いほど、敵のスライディングが少し遅くなり見切りやすくなる
            enemySpeed = Math.max(1.2, 3.2 - (playerData.technique / 15) - (playerData.level / 20));

            document.getElementById('ui-box-jump').style.display = 'block';
            document.getElementById('ui-jump-marker').style.display = 'block'; // 赤い目印線を出す
            document.getElementById('battle-log').innerText = "【フェーズ2】あいてが突っ込んできた！赤い線をこえる瞬間にジャンプ！";
            document.getElementById('battle-buttons-area').innerHTML = `<button id="btn-game-main" onclick="executeJump()" style="background-color: #ff9800; box-shadow: 0 4px 0 #e65100; width:85%; font-size:18px;">🪄 タイミングよくジャンプ！</button>`;

            const enemy = document.getElementById('stadium-enemy');
            enemy.innerText = "🏃‍♂️💨";
            enemy.style.left = enemyPositionLeft + "%";

            // 物理的な座標移動をループ処理でシミュレート
            gameLoopInterval = setInterval(() => {
                enemyPositionLeft -= enemySpeed;
                enemy.style.left = enemyPositionLeft + "%";

                // 敵が完全にあすき選手を通り過ぎたらフェーズ終了
                if (enemyPositionLeft <= -10) {
                    clearInterval(gameLoopInterval);
                    endJumpPhase();
                }
            }, 30);
        }

        function executeJump() {
            if(hasJumped) return; // 1回しか跳べない仕様
            hasJumped = true;

            const player = document.getElementById('stadium-player');
            // あすき選手が上にビューンと跳ね上がる（0.35秒間空中に浮く）
            player.style.bottom = "65px";
            
            // ★【ここが物理タイミングの核心】ジャンプした瞬間の、敵の「現在の位置」を判定！
            // 赤い線が28%の位置にあるので、敵が 22% 〜 36% の間にいれば空中回避成功！
            if (enemyPositionLeft >= 20 && enemyPositionLeft <= 38) {
                // 回避成功フラグを一時退避
                player.setAttribute('data-jump-success', 'true');
            } else {
                player.setAttribute('data-jump-success', 'false');
            }

            setTimeout(() => { 
                player.style.bottom = "15px"; // 着地
            }, 350);
        }

        function endJumpPhase() {
            const log = document.getElementById('battle-log');
            const enemy = document.getElementById('stadium-enemy');
            const player = document.getElementById('stadium-player');
            const btn = document.getElementById('btn-game-main');
            if(btn) btn.disabled = true;

            const isSuccess = player.getAttribute('data-jump-success') === 'true';
            player.removeAttribute('data-jump-success');

            if (hasJumped && isSuccess) {
                log.innerHTML = `<span style="color:#4caf50; font-weight:bold;">✨ かんぺきなジャンプ！</span> スライディングをきれいに飛びこえた！`;
                enemy.style.left = "-20%";
            } else {
                currentMatchStamina = Math.max(1, currentMatchStamina - 3);
                updateStaminaUI();
                enemy.style.transform = "scale(1.3)";
                player.style.left = "5%"; // 吹っ飛ぶ
                log.innerHTML = `<span style="color:#f44336; font-weight:bold;">😢 ズドン！ファールスライディング！</span> もろに足をけられた…スタミナがへった！(-3)`;
            }

            setTimeout(() => {
                enemy.style.transform = "none";
                document.getElementById('ui-box-jump').style.display = 'none';
                document.getElementById('ui-jump-marker').style.display = 'none';
                initShootPhase();
            }, 1800);
        }

        // ── フェーズ3：最後のシュートゲージ（タイミング合わせ） ──
        function initShootPhase() {
            matchPhase = "shoot";
            const enemy = document.getElementById('stadium-enemy');
            enemy.innerText = "🧤"; // 敵キーパー降臨
            enemy.style.left = "85%";

            // バグ対策：HTMLにあらかじめ書いてあるシュートゲージを展開
            document.getElementById('ui-box-shoot').style.display = 'block';
            document.getElementById('battle-log').innerText = "【ファイナル】ラストシュート！赤いゾーンをねらってボタンをおせ！";
            document.getElementById('battle-buttons-area').innerHTML = `<button id="btn-game-main" onclick="executeShoot()" style="background-color: #29b6f6; box-shadow: 0 4px 0 #0288d1; width:85%; font-size:18px;">🔥 いま、シュート！！！</button>`;

            // ★バグを完全粉砕するリフロー（再描画）ハック
            const indicator = document.getElementById('final-indicator');
            indicator.style.animation = 'none';
            indicator.offsetHeight; // これを挟むことで、ブラウザに「今すぐ動かせ！」と強制します

            // ★スタミナ連動！ここまでボロボロ（ミス多数）だと、ゲージ速度が超高速化！
            // スタミナが満点(10)なら1.2秒で往復。スタミナ3なら0.45秒の超ハイスピード！
            const speedDuration = Math.max(0.4, (currentMatchStamina / maxMatchStamina) * 1.2); 
            indicator.style.animation = `moveBar ${speedDuration}s infinite linear alternate`;
        }

        function executeShoot() {
            const indicator = document.getElementById('final-indicator');
            const gaugeBox = document.getElementById('final-gauge-box');
            
            const computedStyle = window.getComputedStyle(indicator);
            const leftStr = computedStyle.getPropertyValue('left');
            const parentWidth = gaugeBox.offsetWidth;
            const currentPercent = (parseFloat(leftStr) / parentWidth) * 100;

            indicator.style.animation = 'none';
            indicator.style.left = leftStr; // その場にストップ

            document.getElementById('btn-game-main').disabled = true;

            setTimeout(() => {
                const overlay = document.getElementById('result-overlay');
                const announcement = document.getElementById('result-announcement');
                const subText = document.getElementById('result-sub-text');
                
                overlay.style.display = 'flex';
                
                if (currentPercent >= 68 && currentPercent <= 87) {
                    const prize = 50 + (playerData.kick * 2) + playerData.technique;
                    playerData.money += prize;
                    announcement.innerHTML = "⚽️🔥 GOOOOOAL!!! 🔥⚽️";
                    announcement.style.color = "#ffeb3b";
                    announcement.style.animation = "popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both, goalFlash 0.3s infinite alternate";
                    subText.innerHTML = `🎉 <strong>3連コンボからの、サイキョウほのおシュート！！</strong><br>あいてのキーパーもろとも、ゴールネットをぶちやぶったぞ！！<br><br>💰 <strong>${prize}えん</strong> ゲット！`;
                } else {
                    // タイミングを外しても、レベルとスピードが高ければ確率でねじ込める
                    const winChance = playerData.level + playerData.speed;
                    if (Math.random() * winChance > 8) {
                        playerData.money += 20;
                        announcement.innerHTML = "⚽️ GOAL!!! 🏃‍♂️💨";
                        announcement.style.color = "#00e5ff";
                        announcement.style.animation = "popIn 0.4s both";
                        subText.innerHTML = `◯ <strong>ナイスゴール！</strong><br>タイミングはズレたけど、${playerData.name}選手の圧倒的なスピードでキーパーの手をハジきとばして決めたぞ！<br><br>💰 <strong>20えん</strong> ゲット！`;
                    } else {
                        announcement.innerHTML = "🧤 SAVED... 😢";
                        announcement.style.color = "#b0bec5";
                        announcement.style.animation = "popIn 0.4s both";
                        subText.innerHTML = `あいてのキーパーのスーパーセーブにとめられた…！<br>くやしい！もっとれんしゅうして、AIかんとくにステータスを上げてもらおう！`;
                    }
                }
                saveGame();
            }, 1000);
        }

        function closeResultOverlay() {
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('ui-box-shoot').style.display = 'none';
            document.getElementById('battle-buttons-area').innerHTML = `<button id="btn-game-main" onclick="startMatchCombo()" style="background-color: #d32f2f; box-shadow: 0 4px 0 #b71c1c; width: 85%;">しあいはじめる！</button>`;
            document.getElementById('battle-log').innerText = "コンボを繋げて次のゴールをめざそう！";
            resetStadiumElements();
            updateUI();
        }

        function resetData() {
            if (confirm('ほんとうにデータをさいしょからにする？')) {
                localStorage.removeItem('soccer_rpg_save');
                playerData = { name: "", level: 1, kick: 10, speed: 10, technique: 10, stamina: 10, money: 0 };
                alert('リセットしました！');
                location.reload();
            }
        }
    </script>
</body>
</html>
