<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サッカーせいちょうRPG - スプリント1（UIリニューアル版）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1b5e20;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 15px auto;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        /* ★【ここが新しい！】トレーディングカード風の縦長ステータスカード */
        .status-card {
            min-height: 480px; /* 縦長にして画像を大きく見せる */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }

        /* ★背景画像をカード全体に引き伸ばして敷き詰めるロジック（絶対配置） */
        .card-background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 縦横比を維持してカード全体を覆う */
            z-index: 1; /* 一番後ろに配置 */
        }

        /* ★画像の上に重ねる文字やボタンのコンテナ（画像より前に出す） */
        .card-content {
            position: relative;
            z-index: 2; /* 画像より前に配置 */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ★【画像に影響がない場所へ背景色ありで表示】ガラス風の半透明ダークボックス */
        .glass-box {
            background: rgba(13, 27, 42, 0.75); /* 半透明の濃い紺色 */
            backdrop-filter: blur(4px); /* 背景を少しぼかして文字をクッキリさせるマほう */
            -webkit-backdrop-filter: blur(4px);
            padding: 12px 20px;
            border-radius: 12px;
            width: 85%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            margin: 5px 0;
        }

        /* 画像がないときに中央で優雅に跳ねる絵文字エリア */
        .character-emoji-area {
            font-size: 80px;
            margin: 40px 0;
            animation: bounce 2s infinite ease-in-out;
        }

        .stage-badge {
            background-color: #00e5ff;
            color: #0d1b2a;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            text-shadow: none;
        }

        button {
            background-color: #ff9800;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #e65100;
            transition: 0.1s;
            margin: 5px;
        }

        button:disabled {
            background-color: #78909c !important;
            box-shadow: 0 4px 0 #455a64 !important;
            cursor: not-allowed;
        }

        button:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }

        .gauge-container {
            width: 80%;
            height: 25px;
            background-color: #ddd;
            margin: 20px auto;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
            display: none;
        }

        .sweet-spot {
            position: absolute;
            left: 70%;
            width: 15%;
            height: 100%;
            background-color: #ff1744;
        }

        .gauge-bar {
            height: 100%;
            width: 8px;
            background-color: #333;
            position: absolute;
            left: 0;
            animation: moveBar 1.2s infinite linear alternate;
        }

        .log-box {
            background: #0d1b2a;
            padding: 12px;
            border-radius: 8px;
            min-height: 40px;
            margin-top: 10px;
            font-size: 14px;
            border-left: 4px solid #00e5ff;
            text-align: left;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes moveBar {
            0% { left: 0%; }
            100% { left: 96%; }
        }
    </style>
</head>
<body>

    <h1>⚽️ サッカーせいちょうRPG ⚽️</h1>

    <div class="card status-card" id="status-card-element">
        
        <div id="bg-img-container"></div>

        <div class="card-content">
            <div class="stage-badge" id="txt-stage">Jリーグへん</div>
            
            <div class="glass-box" style="margin-top: 5px;">
                <h2 style="margin: 0; font-size: 20px;">なまえ：<span id="txt-name" style="color: #00e5ff;">？？？</span> 選手</h2>
            </div>
        </div>

        <div class="card-content" id="fallback-emoji-container" style="display: none;">
            <div class="character-emoji-area" id="txt-fallback-emoji">👦</div>
        </div>

        <div class="card-content">
            <div class="glass-box">
                <p style="font-size: 15px; font-weight: bold; line-height: 1.5; margin: 0; text-align: left; padding-left: 10px;">
                    レベル: <span id="txt-level" style="color: #ffeb3b; font-size: 20px;">1</span><br>
                    ⚽️ キック: <span id="txt-kick">10</span><br>
                    ⚡️ スピード: <span id="txt-speed">10</span><br>
                    🪄 テクニック: <span id="txt-technique">10</span><br>
                    ❤️ スタミナ: <span id="txt-stamina">10</span>
                </p>
            </div>

            <div class="glass-box" style="padding: 6px 12px; width: auto; margin-top: 8px;">
                <p style="font-size: 13px; color: #ffeb3b; margin: 0; font-weight: bold;">もってるおかね: <span id="txt-money">0</span> 円</p>
            </div>
            
            <button onclick="changeName()" style="background-color: #78909c; box-shadow: 0 4px 0 #455a64; padding: 5px 12px; font-size: 11px; margin-top: 8px;">なまえをかえる</button>
        </div>
    </div>

    <div class="card">
        <h3>ほうこく広場（AIかんとく）</h3>
        <button id="btn-voice" onclick="startSpeech()">🎙 れんしゅうを声でほうこく！</button>
        <div class="log-box" id="voice-log">上のボタンをおして、「シュートのれんしゅうをしたよ！」などとしゃべってね！</div>
    </div>

    <div class="card">
        <h3>VS ライバルチーム</h3>
        <button id="btn-battle-init" onclick="readyBattle()" style="background-color: #d32f2f; box-shadow: 0 4px 0 #b71c1c;">しあいはじめる！</button>
        
        <div class="gauge-container" id="gauge-box">
            <div class="sweet-spot"></div>
            <div class="gauge-bar" id="indicator"></div>
        </div>
        
        <button id="btn-shoot" onclick="fireShoot()" style="background-color: #29b6f6; box-shadow: 0 4px 0 #0288d1; display: none;">🔥 いま、シュート！！</button>
        <div class="log-box" id="battle-log">じゅんびちゅう...</div>
    </div>

    <button onclick="resetData()" style="background: none; box-shadow: none; font-size: 10px; color: #aaa; margin-top: 30px;">データをさいしょからにする</button>

    <script>
        // --- 1. グローバル変数とセーブデータの定義 ---
        let playerData = {
            name: "",
            level: 1,
            kick: 10,
            speed: 10,
            technique: 10,
            stamina: 10,
            money: 0
        };

        window.onload = function() {
            const savedData = localStorage.getItem('soccer_rpg_save');
            if (savedData) {
                playerData = JSON.parse(savedData);
            }
            if (!playerData.name) {
                setTimeout(() => { askName(); }, 500);
            } else {
                updateUI();
            }
        };

        function askName() {
            let inputName = prompt("きみの なまえを おしえてね！", "あすき");
            playerData.name = (inputName === null || inputName.trim() === "") ? "あすき" : inputName;
            saveGame();
        }

        function changeName() {
            let inputName = prompt("新しい なまえを おしえてね！", playerData.name);
            if (inputName !== null && inputName.trim() !== "") {
                playerData.name = inputName;
                saveGame();
            }
        }

        // ★UI更新（カードの背景画像化とフォールバック処理）
        function updateUI() {
            document.getElementById('txt-name').innerText = playerData.name;
            document.getElementById('txt-level').innerText = playerData.level;
            document.getElementById('txt-kick').innerText = playerData.kick;
            document.getElementById('txt-speed').innerText = playerData.speed;
            document.getElementById('txt-technique').innerText = playerData.technique;
            document.getElementById('txt-stamina').innerText = playerData.stamina;
            document.getElementById('txt-money').innerText = playerData.money;

            const stageBadge = document.getElementById('txt-stage');
            const bgImgContainer = document.getElementById('bg-img-container');
            const fallbackContainer = document.getElementById('fallback-emoji-container');
            const fallbackEmoji = document.getElementById('txt-fallback-emoji');
            
            let imageSrc = "";
            let emojiText = "";

            // ステージ判定
            if (playerData.level >= 20) {
                stageBadge.innerText = "🏆 せかいチャンピオン！";
                stageBadge.style.backgroundColor = "#ffd700";
                imageSrc = "avatar_clear.png";
                emojiText = "👑🏆";
            } else if (playerData.level >= 10) {
                stageBadge.innerText = "🌎 ワールドカップへん";
                stageBadge.style.backgroundColor = "#ff4081";
                imageSrc = "avatar_w.png";
                emojiText = "🇯🇵🏃‍♂️";
            } else {
                stageBadge.innerText = "⚽️ Jリーグへん";
                stageBadge.style.backgroundColor = "#00e5ff";
                imageSrc = "avatar_j.png";
                emojiText = "👦";
            }

            // ★背景画像としての埋め込みと、エラー時の自動絵文字切り替え（フォールバック）
            fallbackEmoji.innerText = emojiText;
            fallbackContainer.style.display = 'none'; // 一旦隠す

            // <img>タグを背景として挿入し、読み込み失敗(onerror)したら絵文字を出す
            bgImgContainer.innerHTML = `<img src="${imageSrc}" class="card-background-img" onload="document.getElementById('fallback-emoji-container').style.display='none';" onerror="this.style.display='none'; document.getElementById('fallback-emoji-container').style.display='block';">`;
        }

        function saveGame() {
            localStorage.setItem('soccer_rpg_save', JSON.stringify(playerData));
            updateUI();
        }

        // --- 2. 音声認識 ---
        let recognition = null;
        let isListening = false;
        let latestTranscript = "";
        let isProcessed = false;

        function startSpeech() {
            const voiceBtn = document.getElementById('btn-voice');
            const voiceLog = document.getElementById('voice-log');

            if (isListening && recognition) {
                recognition.stop();
                if (!isProcessed) {
                    isProcessed = true;
                    if (latestTranscript.trim() !== "") {
                        processAIWithText(latestTranscript);
                    } else {
                        voiceLog.innerText = "なにも聞こえなかったよ。もう一度大きな声でためしてね。";
                    }
                }
                return;
            }

            if (!recognition) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    voiceLog.innerText = "エラー: このスマホ・ブラウザはマイクに対応していません。";
                    return;
                }
                recognition = new SpeechRecognition();
                recognition.lang = 'ja-JP';
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;

                recognition.onstart = function() {
                    isListening = true;
                    isProcessed = false;
                    latestTranscript = "";
                    voiceBtn.innerText = "🛑 話しおわったらここをおす！";
                    voiceBtn.style.backgroundColor = "#d32f2f";
                    voiceBtn.style.boxShadow = "0 4px 0 #b71c1c";
                    voiceLog.innerText = "スマホにむかって話してね！話し終わったら、上の赤いボタンをおしてね。";
                };

                recognition.onresult = function(event) {
                    let resultText = "";
                    let isFinal = false;

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        resultText += event.results[i][0].transcript;
                        if (event.results[i].isFinal) { isFinal = true; }
                    }
                    
                    latestTranscript = resultText;
                    
                    if (isFinal && !isProcessed) {
                        isProcessed = true;
                        processAIWithText(latestTranscript);
                    } else if (!isProcessed) {
                        voiceLog.innerHTML = `<strong>ききとり中：</strong> 「<span style="color: #00e5ff;">${latestTranscript}</span>」`;
                    }
                };

                recognition.onerror = function(event) {
                    if (event.error !== 'aborted' && !isProcessed) {
                        voiceLog.innerText = "うまくききとれなかったよ。(error: " + event.error + ")";
                    }
                };

                recognition.onend = function() {
                    isListening = false;
                    voiceBtn.innerText = "🎙 れんしゅうを声でほうこく！";
                    voiceBtn.style.backgroundColor = "#ff9800";
                    voiceBtn.style.boxShadow = "0 4px 0 #e65100";
                };
            }

            try { recognition.start(); } catch (e) { console.log(e); }
        }

        function processAIWithText(text) {
            const voiceLog = document.getElementById('voice-log');
            voiceLog.innerHTML = `<strong>ききとったよ：</strong> 「${text}」<br><br>⏳ AIかんとくがかんがえ中...`;

            setTimeout(() => {
                let statusUpText = "";
                
                if (text.includes("シュート") || text.includes("点") || text.includes("キック")) {
                    playerData.kick += 3;
                    statusUpText = "⚽️ キックが 3 アップ！";
                } else if (text.includes("走") || text.includes("ダッシュ") || text.includes("スピード") || text.includes("はやい")) {
                    playerData.speed += 3;
                    statusUpText = "⚡️ スピードが 3 アップ！";
                } else if (text.includes("パス") || text.includes("リフティング") || text.includes("うまい") || text.includes("わざ")) {
                    playerData.technique += 3;
                    statusUpText = "🪄 テクニックが 3 アップ！";
                } else if (text.includes("ドリブル") || text.includes("たいりょく") || text.includes("スタミナ") || text.includes("しあい")) {
                    playerData.stamina += 3;
                    statusUpText = "❤️ スタミナが 3 アップ！";
                } else {
                    playerData.kick += 1;
                    playerData.speed += 1;
                    playerData.technique += 1;
                    playerData.stamina += 1;
                    statusUpText = "🌟 すべての能力が 1 アップ！";
                }
                
                playerData.level += 1;
                voiceLog.innerHTML = `🤖 <strong>AIかんとく：</strong><br>「${text}」だね！素晴らしいれんしゅうだ！ごほうびに <strong>${statusUpText}</strong> レベルも上がったぞ！`;
                saveGame();
            }, 1500);
        }

        // --- 3. タイミング合わせシュートバトル ---
        function readyBattle() {
            const indicator = document.getElementById('indicator');
            indicator.style.animation = 'none';
            indicator.offsetHeight;
            indicator.style.animation = 'moveBar 1.2s infinite linear alternate';

            document.getElementById('btn-battle-init').style.display = 'none';
            document.getElementById('gauge-box').style.display = 'block';
            document.getElementById('btn-shoot').style.display = 'inline-block';
            document.getElementById('battle-log').innerText = "うごくバーをよーく狙って、赤いゾーンでシュートをおせ！！";
        }

        function fireShoot() {
            const indicator = document.getElementById('indicator');
            const gaugeBox = document.getElementById('gauge-box');
            
            const computedStyle = window.getComputedStyle(indicator);
            const leftStr = computedStyle.getPropertyValue('left');
            const parentWidth = gaugeBox.offsetWidth;
            const currentPercent = (parseFloat(leftStr) / parentWidth) * 100;

            indicator.style.animation = 'none';
            indicator.style.left = leftStr;

            document.getElementById('btn-shoot').style.display = 'none';
            document.getElementById('btn-battle-init').style.display = 'inline-block';

            const battleLog = document.getElementById('battle-log');
            battleLog.innerText = "ゴゴゴゴ… ほのおのシュートをはなった！！";

            setTimeout(() => {
                if (currentPercent >= 68 && currentPercent <= 87) {
                    const prize = 50 + (playerData.kick * 2) + playerData.technique;
                    playerData.money += prize;
                    battleLog.innerHTML = `🎉 <strong>ジャストミート！さいきょうシュート！！</strong><br>あいてのキーパーをふっとばしてゴール！ <strong>${prize}えん</strong> ゲットした！`;
                } else {
                    const winChance = playerData.level + playerData.speed;
                    if (Math.random() * winChance > 8) {
                        playerData.money += 20;
                        battleLog.innerHTML = `◯ <strong>ゴール！</strong><br>タイミングはズレたけど、${playerData.name}選手のスピードであいてをぬきさって決めたぞ！ <strong>20えん</strong> ゲット！`;
                    } else {
                        battleLog.innerHTML = `😢 <strong>キーパーにとめられた…</strong><br>もっとれんしゅうして、レベルやステータスを上げてリベンジだ！`;
                    }
                }
                saveGame();
            }, 1200);
        }

        function resetData() {
            if (confirm('ほんとうにデータをさいしょからにする？')) {
                localStorage.removeItem('soccer_rpg_save');
                playerData = { name: "", level: 1, kick: 10, speed: 10, technique: 10, stamina: 10, money: 0 };
                alert('リセットしました！新しい名前を入力してね。');
                location.reload();
            }
        }
    </script>
</body>
</html>
