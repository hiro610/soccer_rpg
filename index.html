<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サッカーせいちょうRPG - スプリント1（演出最大化版）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1b5e20;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .card-outside-header {
            max-width: 400px;
            margin: 0 auto 10px auto;
            text-align: center;
        }

        .name-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 15px auto;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        .status-card {
            height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 15px;
        }

        .card-background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-box {
            background: rgba(13, 27, 42, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 15px 20px;
            border-radius: 12px;
            width: 85%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 5px;
        }

        .character-emoji-area {
            font-size: 80px;
            margin-bottom: 120px;
            animation: bounce 2s infinite ease-in-out;
        }

        .stage-badge {
            background-color: #00e5ff;
            color: #0d1b2a;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        button {
            background-color: #ff9800;
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #e65100;
            transition: 0.1s;
            margin: 5px;
        }

        button:disabled {
            background-color: #78909c !important;
            box-shadow: 0 4px 0 #455a64 !important;
            cursor: not-allowed;
        }

        button:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }

        .gauge-container {
            width: 80%;
            height: 25px;
            background-color: #ddd;
            margin: 15px auto;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
            display: block;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .sweet-spot {
            position: absolute;
            left: 70%;
            width: 15%;
            height: 100%;
            background-color: #ff1744;
        }

        .gauge-bar {
            height: 100%;
            width: 8px;
            background-color: #333;
            position: absolute;
            left: 0;
        }

        .log-box {
            background: #0d1b2a;
            padding: 12px;
            border-radius: 8px;
            min-height: 40px;
            margin-top: 10px;
            font-size: 14px;
            border-left: 4px solid #00e5ff;
            text-align: left;
            line-height: 1.5;
        }

        .report-box {
            border: 2px dashed #ffeb3b;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            background: rgba(255,235,59,0.05);
        }

        /* ＝★＝ スタジアム電光掲示板風ポップアップ演出のCSS ＝★＝ */
        #result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #result-announcement {
            font-size: 46px;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #result-sub-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 15px;
            max-width: 350px;
            font-size: 16px;
            line-height: 1.6;
        }

        /* 演出用アニメーション */
        @keyframes popIn {
            0% { transform: scale(0.4); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes goalFlash {
            0% { transform: scale(1); text-shadow: 0 0 10px #fff, 0 0 20px #ffeb3b, 0 0 30px #ff9800; }
            100% { transform: scale(1.08); text-shadow: 0 0 20px #fff, 0 0 40px #ff1744, 0 0 60px #ff1744; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes moveBar {
            0% { left: 0%; }
            100% { left: 96%; }
        }
    </style>
</head>
<body>

    <h1>⚽️ サッカーせいちょうRPG ⚽️</h1>

    <div class="card-outside-header">
        <div class="stage-badge" id="txt-stage">Jリーグへん</div>
        <div class="name-container">
            <h2 style="margin: 0; font-size: 22px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">なまえ：<span id="txt-name" style="color: #00e5ff;">？？？</span> 選手</h2>
            <button onclick="changeName()" style="background-color: #78909c; box-shadow: 0 4px 0 #455a64; padding: 6px 14px; font-size: 12px; margin: 0;">なまえをかえる</button>
        </div>
    </div>

    <div class="card status-card" id="status-card-element">
        <div id="bg-img-container"></div>

        <div class="card-content" id="fallback-emoji-container" style="display: none; height: 100%; justify-content: center;">
            <div class="character-emoji-area" id="txt-fallback-emoji">👦</div>
        </div>

        <div class="card-content" style="margin-top: auto;">
            <div class="glass-box">
                <p style="font-size: 15px; font-weight: bold; line-height: 1.6; margin: 0; text-align: left; padding-left: 10px;">
                    レベル: <span id="txt-level" style="color: #ffeb3b; font-size: 20px;">1</span><br>
                    ⚽️ キック: <span id="txt-kick">10</span><br>
                    ⚡️ スピード: <span id="txt-speed">10</span><br>
                    🪄 テクニック: <span id="txt-technique">10</span><br>
                    ❤️ スタミナ: <span id="txt-stamina">10</span><br>
                    <span style="color: #ffeb3b;">💰 もってるおかね: <span id="txt-money">0</span> 円</span>
                </p>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>ほうこく広場（AIかんとく）</h3>
        <button id="btn-voice" onclick="startSpeech()">🎙 れんしゅうを声でほうこく！</button>
        
        <div class="log-box" id="voice-log">上のボタンをおして、「シュートのれんしゅうをしたよ！」などとしゃべね！</div>
        
        <div id="confirm-buttons-area" style="display: none; margin-top: 15px;">
            <button id="btn-confirm-ok" onclick="commitVoiceResult()" style="background-color: #4caf50; box-shadow: 0 4px 0 #388e3c; padding: 14px 28px; font-size: 18px;">👍 これでOK！</button>
            <button id="btn-confirm-retry" onclick="retryVoiceInput()" style="background-color: #f44336; box-shadow: 0 4px 0 #d32f2f; padding: 14px 28px; font-size: 18px;">🔄 やりなおす</button>
        </div>
    </div>

    <div class="card">
        <h3>VS ライバルチーム</h3>
        
        <div class="gauge-container" id="gauge-box">
            <div class="sweet-spot"></div>
            <div class="gauge-bar" id="indicator"></div>
        </div>
        
        <div id="battle-buttons-area">
            <button id="btn-battle-init" onclick="readyBattle()" style="background-color: #d32f2f; box-shadow: 0 4px 0 #b71c1c;">しあいはじめる！</button>
            <button id="btn-shoot" onclick="fireShoot()" style="background-color: #29b6f6; box-shadow: 0 4px 0 #0288d1; display: none;">🔥 いま、シュート！！</button>
        </div>
        
        <div class="log-box" id="battle-log">じゅんびちゅう...</div>
    </div>

    <div id="result-overlay">
        <div id="result-announcement">GOAL!!</div>
        <div id="result-sub-box">
            <p id="result-sub-text" style="margin: 0;"></p>
        </div>
        <button onclick="closeResultOverlay()" style="margin-top: 35px; font-size: 20px; padding: 14px 35px; background-color: #4caf50; box-shadow: 0 4px 0 #388e3c;">つぎの試合へ！</button>
    </div>

    <button onclick="resetData()" style="background: none; box-shadow: none; font-size: 10px; color: #aaa; margin-top: 30px;">データをさいしょからにする</button>

    <script>
        // --- 1. グローバル変数とセーブデータの定義 ---
        let playerData = {
            name: "",
            level: 1,
            kick: 10,
            speed: 10,
            technique: 10,
            stamina: 10,
            money: 0
        };

        window.onload = function() {
            const savedData = localStorage.getItem('soccer_rpg_save');
            if (savedData) { playerData = JSON.parse(savedData); }
            if (!playerData.name) {
                setTimeout(() => { askName(); }, 500);
            } else {
                updateUI();
            }
        };

        function askName() {
            let inputName = prompt("きみの なまえを おしえてね！", "あすき");
            playerData.name = (inputName === null || inputName.trim() === "") ? "あすき" : inputName;
            saveGame();
        }

        function changeName() {
            let inputName = prompt("新しい なまえを おしえてね！", playerData.name);
            if (inputName !== null && inputName.trim() !== "") {
                playerData.name = inputName;
                saveGame();
            }
        }

        function updateUI() {
            document.getElementById('txt-name').innerText = playerData.name;
            document.getElementById('txt-level').innerText = playerData.level;
            document.getElementById('txt-kick').innerText = playerData.kick;
            document.getElementById('txt-speed').innerText = playerData.speed;
            document.getElementById('txt-technique').innerText = playerData.technique;
            document.getElementById('txt-stamina').innerText = playerData.stamina;
            document.getElementById('txt-money').innerText = playerData.money;

            const stageBadge = document.getElementById('txt-stage');
            const bgImgContainer = document.getElementById('bg-img-container');
            const fallbackContainer = document.getElementById('fallback-emoji-container');
            const fallbackEmoji = document.getElementById('txt-fallback-emoji');
            
            let imageSrc = "";
            let emojiText = "";

            if (playerData.level >= 20) {
                stageBadge.innerText = "🏆 せかいチャンピオン！";
                stageBadge.style.backgroundColor = "#ffd700";
                imageSrc = "avatar_clear.png";
                emojiText = "👑🏆";
            } else if (playerData.level >= 10) {
                stageBadge.innerText = "🌎 ワールドカップへん";
                stageBadge.style.backgroundColor = "#ff4081";
                imageSrc = "avatar_w.png";
                emojiText = "🇯🇵🏃‍♂️";
            } else {
                stageBadge.innerText = "⚽️ Jリーグへん";
                stageBadge.style.backgroundColor = "#00e5ff";
                imageSrc = "avatar_j.png";
                emojiText = "👦";
            }

            fallbackEmoji.innerText = emojiText;
            fallbackContainer.style.display = 'none';

            bgImgContainer.innerHTML = `<img src="${imageSrc}" class="card-background-img" onload="document.getElementById('fallback-emoji-container').style.display='none';" onerror="this.style.display='none'; document.getElementById('fallback-emoji-container').style.display='block';">`;
        }

        function saveGame() {
            localStorage.setItem('soccer_rpg_save', JSON.stringify(playerData));
            updateUI();
        }

        // --- 2. 音声認識 ---
        let recognition = null;
        let isListening = false;
        let latestTranscript = "";
        let isWaitingConfirm = false;

        function startSpeech() {
            const voiceBtn = document.getElementById('btn-voice');
            const voiceLog = document.getElementById('voice-log');

            if (isListening && recognition) {
                isWaitingConfirm = true;
                recognition.stop();
                voiceBtn.style.display = "none";
                voiceLog.innerText = "⏳ いま話した言葉をあつめています...";
                return;
            }

            if (!recognition) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    voiceLog.innerText = "エラー: このスマホ・ブラウザはマイクに対応していません。";
                    return;
                }
                recognition = new SpeechRecognition();
                recognition.lang = 'ja-JP';
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;
                recognition.continuous = true; 

                recognition.onstart = function() {
                    isListening = true;
                    isWaitingConfirm = false;
                    latestTranscript = "";
                    voiceBtn.innerText = "🛑 話しおわったらここをおす！";
                    voiceBtn.style.backgroundColor = "#d32f2f";
                    voiceBtn.style.boxShadow = "0 4px 0 #b71c1c";
                    voiceLog.innerText = "スマホにむかってゆっくり話してね！考えながら話しても大丈夫だよ。";
                };

                recognition.onresult = function(event) {
                    let resultText = "";
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        resultText += event.results[i][0].transcript;
                    }
                    latestTranscript = resultText;
                    voiceLog.innerHTML = `<strong>ききとり中：</strong> 「<span style="color: #00e5ff;">${latestTranscript}</span>」`;
                };

                recognition.onerror = function(event) {
                    if (event.error !== 'aborted') {
                        voiceLog.innerText = "うまくききとれなかったよ。(error: " + event.error + ")";
                        resetVoiceUI();
                    }
                };

                recognition.onend = function() {
                    isListening = false;
                    
                    if (isWaitingConfirm) {
                        // ★UI改善：テキストの下に確認ボタンエリアが出現
                        document.getElementById('confirm-buttons-area').style.display = 'block';
                        
                        if (latestTranscript.trim() === "") {
                            document.getElementById('voice-log').innerHTML = `うーん、なにも聞こえなかったよ。<br>もういちど「やりなおす」をおして話してみてね！`;
                            document.getElementById('btn-confirm-ok').disabled = true;
                        } else {
                            document.getElementById('voice-log').innerHTML = `🤖 <strong>AIかんとく：</strong><br>「<span style="color: #00e5ff; font-size:16px;">${latestTranscript}</span>」<br>ってきこえたぞ！これでOKなら、したの緑のボタンをおしてね！`;
                            document.getElementById('btn-confirm-ok').disabled = false;
                        }
                    } else {
                        resetVoiceUI();
                    }
                };
            }

            try { recognition.start(); } catch (e) { console.log(e); }
        }

        function retryVoiceInput() {
            isWaitingConfirm = false;
            document.getElementById('confirm-buttons-area').style.display = 'none';
            resetVoiceUI();
        }

        function commitVoiceResult() {
            isWaitingConfirm = false;
            document.getElementById('confirm-buttons-area').style.display = 'none';
            processAIWithText(latestTranscript);
        }

        function resetVoiceUI() {
            const voiceBtn = document.getElementById('btn-voice');
            voiceBtn.style.display = 'inline-block';
            voiceBtn.innerText = "🎙 れんしゅうを声でほうこく！";
            voiceBtn.style.backgroundColor = "#ff9800";
            voiceBtn.style.boxShadow = "0 4px 0 #e65100";
            document.getElementById('voice-log').innerText = "上のボタンをおして、「シュートのれんしゅうをしたよ！」などとしゃべってね！";
        }

        function processAIWithText(text) {
            const voiceLog = document.getElementById('voice-log');
            voiceLog.innerHTML = `<strong>ききとったよ：</strong> 「${text}」<br><br>⏳ AIかんとくがかんがえ中...`;

            setTimeout(() => {
                let statusUpText = "";
                
                if (text.includes("シュート") || text.includes("点") || text.includes("キック")) {
                    playerData.kick += 3;
                    statusUpText = "⚽️ キックが 【3】 アップ！";
                } else if (text.includes("走") || text.includes("ダッシュ") || text.includes("スピード") || text.includes("はやい")) {
                    playerData.speed += 3;
                    statusUpText = "⚡️ スピードが 【3】 アップ！";
                } else if (text.includes("パス") || text.includes("リフティング") || text.includes("うまい") || text.includes("わざ")) {
                    playerData.technique += 3;
                    statusUpText = "🪄 テクニックが 【3】 アップ！";
                } else if (text.includes("ドリブル") || text.includes("たいりょく") || text.includes("スタミナ") || text.includes("しあい")) {
                    playerData.stamina += 3;
                    statusUpText = "❤️ スタミナが 【3】 アップ！";
                } else {
                    playerData.kick += 1;
                    playerData.speed += 1;
                    playerData.technique += 1;
                    playerData.stamina += 1;
                    statusUpText = "🌟 すべての能力が 【1】 アップ！";
                }
                
                playerData.level += 1;
                
                voiceLog.innerHTML = `
                    🤖 <strong>AIかんとく：</strong><br>
                    「${text}」だね！すばらしいれんしゅうだ！<br>
                    
                    <div class="report-box">
                        <strong>📊 しんさくリポート</strong><br>
                        ━━━━━━━━━━━━━━━<br>
                        ${statusUpText}<br>
                        🆙 <strong>レベルが 【1】 あがったぞ！</strong><br>
                        ━━━━━━━━━━━━━━━
                    </div>
                    <br>
                    <button onclick="resetVoiceUI()" style="background-color: #4caf50; padding: 6px 14px; font-size: 13px; margin: 0; box-shadow: 0 3px 0 #388e3c;">つぎのれんしゅうへ</button>
                `;
                saveGame();
            }, 1500);
        }

        // --- 3. タイミング合わせシュートバトル ---
        function readyBattle() {
            const indicator = document.getElementById('indicator');
            const gaugeBox = document.getElementById('gauge-box');
            
            gaugeBox.style.opacity = '1';
            indicator.style.animation = 'none';
            indicator.offsetHeight;
            indicator.style.animation = 'moveBar 1.2s infinite linear alternate';

            document.getElementById('btn-battle-init').style.display = 'none';
            document.getElementById('btn-shoot').style.display = 'inline-block';
            document.getElementById('battle-log').innerText = "うごくバーをよーく狙って、赤いゾーンでシュートをおせ！！";
        }

        function fireShoot() {
            const indicator = document.getElementById('indicator');
            const gaugeBox = document.getElementById('gauge-box');
            
            const computedStyle = window.getComputedStyle(indicator);
            const leftStr = computedStyle.getPropertyValue('left');
            const parentWidth = gaugeBox.offsetWidth;
            const currentPercent = (parseFloat(leftStr) / parentWidth) * 100;

            indicator.style.animation = 'none';
            indicator.style.left = leftStr;

            document.getElementById('btn-shoot').style.display = 'none';
            document.getElementById('btn-battle-init').style.display = 'inline-block';

            const battleLog = document.getElementById('battle-log');
            battleLog.innerText = "ゴゴゴゴ… ほのおのシュートをはなった！！";

            // ★1.2秒後にスタジアム風ド派手ポップアップを出す
            setTimeout(() => {
                const overlay = document.getElementById('result-overlay');
                const announcement = document.getElementById('result-announcement');
                const subText = document.getElementById('result-sub-text');
                
                // ポップアップを画面いっぱいに表示
                overlay.style.display = 'flex';
                
                if (currentPercent >= 68 && currentPercent <= 87) {
                    // 【大成功：ウルトラゴール】
                    const prize = 50 + (playerData.kick * 2) + playerData.technique;
                    playerData.money += prize;
                    
                    announcement.innerHTML = "⚽️🔥 GOOOOOAL!!! 🔥⚽️";
                    announcement.style.color = "#ffeb3b"; // 金色
                    // ポップイン＋激しい点滅フラッシュアニメーションを適用
                    announcement.style.animation = "popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both, goalFlash 0.3s infinite alternate";
                    
                    subText.innerHTML = `
                        🎉 <strong>ジャストミート！さいきょうのシュート！！</strong><br>
                        ものすごいスピードであいてのキーパーをふっとばしてゴールネットを突き破ったぞ！<br><br>
                        💰 <strong>${prize}えん</strong> ゲット！
                    `;
                    battleLog.innerHTML = `🎉 さいきょうシュートでゴール！`;
                } else {
                    const winChance = playerData.level + playerData.speed;
                    if (Math.random() * winChance > 8) {
                        // 【成功：スピードねじ込みゴール】
                        playerData.money += 20;
                        
                        announcement.innerHTML = "⚽️ GOAL!!! 🏃‍♂️💨";
                        announcement.style.color = "#00e5ff"; // スピードの青色
                        announcement.style.animation = "popIn 0.4s both";
                        
                        subText.innerHTML = `
                            ◯ <strong>ナイスゴール！</strong><br>
                            タイミングは少しズレたけど、${playerData.name}選手の圧倒的なスピードであいてのディフェンダーをぬきさって決めたぞ！<br><br>
                            💰 <strong>20えん</strong> ゲット！
                        `;
                        battleLog.innerHTML = `◯ スピードでねじこんだゴール！`;
                    } else {
                        // 【失敗：キーパーセーブ】
                        announcement.innerHTML = "🧤 SAVED... 😢";
                        announcement.style.color = "#b0bec5"; // グレー
                        announcement.style.animation = "popIn 0.4s both";
                        
                        subText.innerHTML = `
                            あいてのキーパーにがっちりとめられてしまった…！<br>
                            くやしい！もっとれんしゅうして、ステータスを上げてつぎは絶対にきめよう！
                        `;
                        battleLog.innerHTML = `😢 キーパーにとめられた…`;
                    }
                }
                
                gaugeBox.style.opacity = '0.4';
                saveGame();
            }, 1200);
        }

        // ポップアップを閉じる関数
        function closeResultOverlay() {
            document.getElementById('result-overlay').style.display = 'none';
        }

        function resetData() {
            if (confirm('ほんとうにデータをさいしょからにする？')) {
                localStorage.removeItem('soccer_rpg_save');
                playerData = { name: "", level: 1, kick: 10, speed: 10, technique: 10, stamina: 10, money: 0 };
                alert('リセットしました！新しい名前を入力してね。');
                location.reload();
            }
        }
    </script>
</body>
